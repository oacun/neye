<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Восстановление пароля - Игольное ушко</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="reset-password-page">
        <div class="reset-password-container">
            <h1>Восстановление пароля</h1>
            
            <div id="loading" style="text-align: center; padding: 2rem;">
                <p>Проверка токена...</p>
            </div>
            
            <div id="resetForm" style="display: none;">
                <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">
                    Введите новый пароль для аккаунта <strong id="resetUsername"></strong>
                </p>
                
                <div id="resetError" class="error-message" style="display: none;"></div>
                <div id="resetSuccess" class="success-message" style="display: none;"></div>
                
                <form id="resetPasswordForm">
                    <div class="form-group">
                        <label>Новый пароль:</label>
                        <input type="password" id="newPassword" required minlength="6" placeholder="Минимум 6 символов">
                    </div>
                    <div class="form-group">
                        <label>Подтвердите пароль:</label>
                        <input type="password" id="confirmPassword" required minlength="6">
                    </div>
                    <button type="submit" class="btn-submit">Сохранить новый пароль</button>
                </form>
                
                <div style="margin-top: 2rem; text-align: center;">
                    <a href="/" style="color: var(--accent-gold);">← Вернуться на главную</a>
                </div>
            </div>
            
            <div id="invalidToken" style="display: none; text-align: center; padding: 2rem;">
                <h2 style="color: #ff4444;">Недействительная ссылка</h2>
                <p style="color: var(--text-secondary); margin-bottom: 2rem;">
                    Эта ссылка для восстановления пароля недействительна или устарела.
                </p>
                <a href="/" class="btn-submit" style="display: inline-block; text-decoration: none;">Вернуться на главную</a>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (!token) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('invalidToken').style.display = 'block';
        } else {
            verifyToken(token);
        }
        
        async function verifyToken(token) {
            try {
                const response = await fetch(`/api/auth/verify-reset-token/${token}`);
                const data = await response.json();
                
                if (response.ok && data.valid) {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('resetForm').style.display = 'block';
                    document.getElementById('resetUsername').textContent = data.username;
                } else {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('invalidToken').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('invalidToken').style.display = 'block';
            }
        }
        
        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            const errorDiv = document.getElementById('resetError');
            const successDiv = document.getElementById('resetSuccess');
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            if (newPassword !== confirmPassword) {
                errorDiv.textContent = 'Пароли не совпадают';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (newPassword.length < 6) {
                errorDiv.textContent = 'Пароль должен быть минимум 6 символов';
                errorDiv.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    successDiv.textContent = 'Пароль успешно изменён! Сейчас вы будете перенаправлены на главную страницу...';
                    successDiv.style.display = 'block';
                    
                    document.getElementById('resetPasswordForm').style.display = 'none';
                    
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 3000);
                } else {
                    errorDiv.textContent = data.error || 'Произошла ошибка';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Ошибка соединения с сервером';
                errorDiv.style.display = 'block';
            }
        });
    </script>
    
    <style>
        .reset-password-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            padding: 2rem;
        }
        
        .reset-password-container {
            background: var(--bg-secondary);
            padding: 3rem;
            border: 1px solid var(--border-subtle);
            max-width: 500px;
            width: 100%;
        }
        
        .reset-password-container h1 {
            font-family: 'Playfair Display', serif;
            color: var(--accent-gold);
            margin-bottom: 2rem;
            text-align: center;
        }
        
        .success-message {
            background: rgba(58, 125, 68, 0.2);
            color: #3a7d44;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
        }
    </style>
</body>
</html>
